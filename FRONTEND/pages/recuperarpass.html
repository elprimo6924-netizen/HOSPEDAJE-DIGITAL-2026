<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Hospedaje Digital</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Sora', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        /* Estados de visibilidad */
        .recovery-step { display: none; }
        .recovery-step.active { display: block; }

        /* Estilos para los mensajes dinámicos */
        .message { display: none; padding: 1rem; border-radius: 0.75rem; font-size: 0.875rem; margin-bottom: 1rem; border-left-width: 4px; }
        .message.success { display: block; background-color: #f0fdf4; color: #166534; border-color: #22c55e; }
        .message.error { display: block; background-color: #fef2f2; color: #991b1b; border-color: #ef4444; }
        .message.info { display: block; background-color: #eff6ff; color: #1e40af; border-color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top_left,_rgba(0,0,0,0.28),_transparent_32%),linear-gradient(135deg,_#101827_0%,_#5a3d28_48%,_#d17a3a_100%)] flex items-center justify-center p-4 font-display">

    <div class="w-full max-w-md bg-white/95 rounded-[28px] shadow-[0_30px_80px_rgba(15,23,42,0.28)] ring-1 ring-white/60 backdrop-blur overflow-hidden">

        <div class="p-8 md:p-10">
            <!-- HEADER -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-sm">
                    <i class="fa-solid fa-key"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-900 mb-2">¿Olvidaste tu contraseña?</h1>
                <p id="stepDescription" class="text-slate-500 text-sm leading-relaxed">
                    Ingresa tu correo para comenzar el proceso de recuperación.
                </p>
            </div>

            <!-- PASO 1: Solicitar Código -->
            <div id="step1" class="recovery-step active">
                <form id="step1Form" class="space-y-5">
                    <div id="step1Message" class="message"></div>

                    <!-- ✏️ MODIFICADO: field-wrapper para validación visual -->
                    <div class="field-wrapper space-y-2 relative">
                        <label for="email1" class="block text-sm font-bold text-slate-700">Correo Electrónico</label>
                        <input type="email" id="email1" name="email" required placeholder="ejemplo@correo.com"
                            class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all duration-200 focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 text-sm">
                    </div>

                    <!-- ✏️ MODIFICADO: Botón con estado de carga -->
                    <button type="submit" id="step1Btn"
                        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-orange-200 transition-all flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
                        <span id="step1BtnText">Enviar Código</span>
                        <i id="step1BtnIcon" class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </form>
            </div>

            <!-- PASO 2: Ingresar Código -->
            <div id="step2" class="recovery-step">
                <form id="step2Form" class="space-y-5">
                    <div id="step2Message" class="message"></div>

                    <!-- ✏️ MODIFICADO: 6 inputs separados para el código -->
                    <div class="space-y-2 text-center">
                        <label class="block text-sm font-bold text-slate-700 mb-3">Código de 6 dígitos</label>
                        <div class="flex gap-2 justify-center" id="code-inputs">
                            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                                class="w-12 h-14 text-center text-2xl font-bold rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-900 outline-none transition-all focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-500/10 caret-transparent" data-code-index="0">
                            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                                class="w-12 h-14 text-center text-2xl font-bold rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-900 outline-none transition-all focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-500/10 caret-transparent" data-code-index="1">
                            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                                class="w-12 h-14 text-center text-2xl font-bold rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-900 outline-none transition-all focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-500/10 caret-transparent" data-code-index="2">
                            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                                class="w-12 h-14 text-center text-2xl font-bold rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-900 outline-none transition-all focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-500/10 caret-transparent" data-code-index="3">
                            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                                class="w-12 h-14 text-center text-2xl font-bold rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-900 outline-none transition-all focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-500/10 caret-transparent" data-code-index="4">
                            <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                                class="w-12 h-14 text-center text-2xl font-bold rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-900 outline-none transition-all focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-500/10 caret-transparent" data-code-index="5">
                        </div>
                        <!-- Hidden input para compatibilidad con passwordRecovery.js -->
                        <input type="hidden" id="code" name="code">
                    </div>

                    <div class="flex gap-3">
                        <button type="button" id="step2Back"
                            class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3.5 rounded-xl transition-all">
                            Atrás
                        </button>
                        <button type="submit" id="step2Btn"
                            class="flex-[2] bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-green-100 transition-all disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                            <span id="step2BtnText">Verificar Código</span>
                            <i id="step2BtnIcon" class="fa-solid fa-check text-xs"></i>
                        </button>
                    </div>
                </form>
            </div>

            <!-- PASO 3: Cambiar Contraseña -->
            <div id="step3" class="recovery-step">
                <form id="step3Form" class="space-y-5">
                    <div id="step3Message" class="message"></div>

                    <!-- ✏️ MODIFICADO: Password con toggle -->
                    <div class="field-wrapper space-y-2 relative">
                        <label for="newPassword" class="block text-sm font-bold text-slate-700">Nueva Contraseña</label>
                        <div class="relative">
                            <input type="password" id="newPassword" name="newPassword" required minlength="8" placeholder="Mínimo 8 caracteres"
                                class="w-full p-3.5 pr-12 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all duration-200 focus:ring-4 focus:ring-green-500/10 focus:border-green-500 text-sm">
                            <button type="button" id="toggleNewPass"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors cursor-pointer" style="background:none;border:none;">
                                <i id="toggleNewPassIcon" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <!-- ✏️ MODIFICADO: Indicador de fortaleza -->
                        <div id="recovery-password-strength" class="mt-2 hidden">
                            <div class="flex gap-1 mb-1">
                                <div class="h-1.5 flex-1 rounded-full bg-slate-200" id="rec-str-bar-1"></div>
                                <div class="h-1.5 flex-1 rounded-full bg-slate-200" id="rec-str-bar-2"></div>
                                <div class="h-1.5 flex-1 rounded-full bg-slate-200" id="rec-str-bar-3"></div>
                                <div class="h-1.5 flex-1 rounded-full bg-slate-200" id="rec-str-bar-4"></div>
                            </div>
                            <p id="rec-str-label" class="text-xs text-slate-500"></p>
                        </div>
                    </div>

                    <div class="field-wrapper space-y-2 relative">
                        <label for="confirmPassword" class="block text-sm font-bold text-slate-700">Confirmar Contraseña</label>
                        <div class="relative">
                            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" placeholder="Repite tu contraseña"
                                class="w-full p-3.5 pr-12 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all duration-200 focus:ring-4 focus:ring-green-500/10 focus:border-green-500 text-sm">
                            <button type="button" id="toggleConfirmPass"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors cursor-pointer" style="background:none;border:none;">
                                <i id="toggleConfirmPassIcon" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-2">
                        <button type="button" id="step3Back"
                            class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3.5 rounded-xl transition-all">
                            Atrás
                        </button>
                        <button type="submit" id="step3Btn"
                            class="flex-[2] bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-orange-200 transition-all disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                            <span id="step3BtnText">Cambiar Contraseña</span>
                            <i id="step3BtnIcon" class="fa-solid fa-lock text-xs"></i>
                        </button>
                    </div>
                </form>
            </div>

            <!-- ENLACE DE VUELTA -->
            <div class="mt-10 pt-6 border-t border-slate-100 text-center">
                <a href="../login.html" class="text-orange-500 hover:text-orange-600 font-bold text-sm transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-left text-xs"></i> Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>

    <!-- ✏️ MODIFICADO: Script inline para 6-digit code navigation antes de passwordRecovery.js -->
    <script>
        // ✏️ MODIFICADO: Lógica de 6 cajas de código
        document.addEventListener('DOMContentLoaded', () => {
            const codeInputs = document.querySelectorAll('#code-inputs input');
            const hiddenCode = document.getElementById('code');

            function updateHiddenCode() {
                hiddenCode.value = [...codeInputs].map(i => i.value).join('');
            }

            codeInputs.forEach((input, idx) => {
                input.addEventListener('input', function() {
                    // Solo permitir números
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if (this.value.length === 1 && idx < codeInputs.length - 1) {
                        codeInputs[idx + 1].focus();
                    }
                    updateHiddenCode();

                    // Estilo visual cuando se llena
                    if (this.value) {
                        this.classList.remove('border-slate-200', 'bg-slate-50');
                        this.classList.add('border-green-400', 'bg-green-50');
                    }
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !this.value && idx > 0) {
                        codeInputs[idx - 1].focus();
                        codeInputs[idx - 1].value = '';
                        codeInputs[idx - 1].classList.remove('border-green-400', 'bg-green-50');
                        codeInputs[idx - 1].classList.add('border-slate-200', 'bg-slate-50');
                        updateHiddenCode();
                    }
                });

                input.addEventListener('focus', function() {
                    this.select();
                });

                // ✏️ MODIFICADO: Pegar código completo
                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const text = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                    [...text].forEach((char, i) => {
                        if (codeInputs[i]) {
                            codeInputs[i].value = char;
                            codeInputs[i].classList.remove('border-slate-200', 'bg-slate-50');
                            codeInputs[i].classList.add('border-green-400', 'bg-green-50');
                        }
                    });
                    if (codeInputs[Math.min(text.length, 5)]) {
                        codeInputs[Math.min(text.length, 5)].focus();
                    }
                    updateHiddenCode();
                });
            });

            // ✏️ MODIFICADO: Toggle password en paso 3
            document.getElementById('toggleNewPass').addEventListener('click', () => {
                const input = document.getElementById('newPassword');
                const icon = document.getElementById('toggleNewPassIcon');
                if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
                else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
            });

            document.getElementById('toggleConfirmPass').addEventListener('click', () => {
                const input = document.getElementById('confirmPassword');
                const icon = document.getElementById('toggleConfirmPassIcon');
                if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-solid fa-eye-slash'; }
                else { input.type = 'password'; icon.className = 'fa-solid fa-eye'; }
            });

            // ✏️ MODIFICADO: Indicador de fortaleza en nueva contraseña
            const newPassInput = document.getElementById('newPassword');
            const recLabels = ['', 'Débil', 'Regular', 'Buena', 'Fuerte'];
            const recColors = ['', 'bg-red-500', 'bg-amber-500', 'bg-blue-500', 'bg-green-500'];
            const recTextColors = ['', 'text-red-500', 'text-amber-500', 'text-blue-500', 'text-green-600'];

            newPassInput.addEventListener('input', function() {
                if (typeof calcularFortaleza !== 'function') return;
                const score = calcularFortaleza(this.value);
                document.getElementById('recovery-password-strength').classList.toggle('hidden', !this.value);
                [1,2,3,4].forEach(i => {
                    const bar = document.getElementById(`rec-str-bar-${i}`);
                    bar.className = `h-1.5 flex-1 rounded-full transition-all duration-300 ${i <= score ? recColors[score] : 'bg-slate-200'}`;
                });
                const label = document.getElementById('rec-str-label');
                label.textContent = this.value ? recLabels[score] : '';
                label.className = `text-xs font-medium ${recTextColors[score] || 'text-slate-500'}`;
            });

            // ✏️ MODIFICADO: Validación de contraseñas coinciden
            document.getElementById('confirmPassword').addEventListener('input', function() {
                const pass = document.getElementById('newPassword').value;
                if (typeof setFieldState === 'function') {
                    if (this.value && this.value !== pass) {
                        setFieldState(this, 'invalido', 'Las contraseñas no coinciden');
                    } else if (this.value && this.value === pass) {
                        setFieldState(this, 'valido');
                    }
                }
            });

            // ✏️ MODIFICADO: Validación email en blur
            document.getElementById('email1').addEventListener('blur', function() {
                if (this.value && typeof validarEmail === 'function') {
                    const v = validarEmail(this.value);
                    if (typeof setFieldState === 'function') {
                        setFieldState(this, v.valido ? 'valido' : 'invalido', v.valido ? '' : 'Ingresa un correo válido');
                    }
                }
            });
            document.getElementById('email1').addEventListener('focus', function() {
                if (typeof setFieldState === 'function') setFieldState(this, 'neutro');
            });
        });
    </script>
    <script src="../js/passwordRecovery.js"></script>
</body>
</html>
