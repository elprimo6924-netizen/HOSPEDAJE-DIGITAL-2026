<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Roles - Hospedaje Digital</title>
    
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false } };</script>
    <style>
        :root {
            --lux-ink: #0f1522;
            --lux-navy: #0b1424;
            --lux-emerald: #0f3d3e;
            --lux-gold: #d6b25e;
            --lux-gold-soft: #f4e6c1;
            --lux-ivory: #f7f2e6;
            --lux-stone: #e7dfcf;
            --lux-shadow: 0 22px 60px rgba(15, 21, 34, 0.18);
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body { background-color: var(--lux-navy) !important; color: var(--color-text) !important; margin: 0 !important; padding: 0 !important; }
        body { font-family: var(--font-family); display: block !important; }
        #main-wrapper {
            background: radial-gradient(1400px 600px at 8% 0%, rgba(26, 49, 76, 0.55), transparent 60%),
                        linear-gradient(180deg, #0b1424 0%, #0d1a2c 40%, #0f1b2b 100%) !important;
            min-height: 100vh; display: flex; flex-direction: column;
        }
        main  { background-color: transparent !important; color: var(--color-text) !important; padding: var(--spacing-lg) !important; flex: none !important; }
        footer { background-color: rgba(255, 255, 255, 0.04) !important; color: #c3c8d4 !important; }
        /* Estilo para el Switch de Estado */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #d6dbe3; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #22c55e; }
        input:checked + .slider:before { transform: translateX(22px); }

        .mod-toolbar-title {
            font-family: "Cinzel", "Trajan Pro", "Times New Roman", serif;
            color: #f8f4ea;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-shadow: 0 6px 18px rgba(0,0,0,0.45);
        }
        .mod-toolbar-title .mod-icon { color: var(--lux-gold); }
        .mod-toolbar-subtitle { color: #cfd5e0; }
        .btn-mod-nuevo {
            background: linear-gradient(135deg, #d6b25e, #b78a2a) !important;
            color: #1b1205 !important;
            box-shadow: 0 14px 28px rgba(183, 138, 42, 0.35) !important;
            border: none !important;
        }
        .btn-mod-nuevo:hover { filter: brightness(1.03); transform: translateY(-1px); }

        .roles-search-card {
            background: linear-gradient(180deg, #fbf7ef 0%, #f6efe1 100%);
            border: 1px solid #efe3c9;
            box-shadow: var(--lux-shadow);
        }
        .roles-search-card input {
            border: 1px solid #e3d4b4 !important;
            background: #fffdf7 !important;
            color: #1a2230 !important;
        }
        .roles-search-card input:focus {
            border-color: var(--lux-gold) !important;
            box-shadow: 0 0 0 4px rgba(214, 178, 94, 0.18) !important;
        }
        .roles-btn-primary {
            background: linear-gradient(135deg, #0f3d3e, #0b2c31) !important;
            box-shadow: 0 14px 28px rgba(15, 61, 62, 0.25) !important;
        }
        .roles-btn-secondary {
            background: #c9d1dc !important;
            color: #1a2230 !important;
        }
        .roles-card {
            background: linear-gradient(180deg, #fbf7ef 0%, #f6efe1 100%);
            border: 1px solid #efe3c9;
            box-shadow: var(--lux-shadow);
        }
        .roles-card thead th {
            background:#f8f2e3 !important;
            color:#7a5a18 !important;
            letter-spacing:.08em !important;
            border-bottom:1px solid #eadfca !important;
        }
        .roles-card tbody tr:hover { background:#fff6e6 !important; }
        .roles-card tbody td { color:#1a2230 !important; }
        .roles-paginacion {
            background:#f8f2e3 !important;
            border-top:1px solid #eadfca !important;
            color:#6b5b3a !important;
        }
        .roles-paginacion button {
            border:1px solid #eadfca !important;
            background:#fffdf7 !important;
            color:#6b5b3a !important;
        }
        .roles-paginacion button:hover { background:#fff3da !important; }
    </style>
</head>
<body>

    <div id="sidebar-placeholder"></div>

    <div id="main-wrapper" class="main-wrapper">

        <header>
            <nav>
                <h1><i class="fa-solid fa-hotel" aria-hidden="true"></i> Hospedaje Digital</h1>
            </nav>
        </header>

        <main>

            <div class="mod-toolbar">
                <div class="mod-toolbar-left">
                    <h2 class="mod-toolbar-title"><i class="fa-solid fa-shield-halved mod-icon" aria-hidden="true"></i> Gestión de Roles</h2>
                    <p class="mod-toolbar-subtitle">Configura los niveles de acceso y permisos del sistema.</p>
                </div>
                <button id="btn-crear-rol" class="btn-mod-nuevo"><i class="fa-solid fa-plus" aria-hidden="true"></i> Nuevo Rol</button>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border border-slate-200 roles-search-card">
                <div class="flex flex-col md:flex-row gap-3">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="busqueda-roles" placeholder="Buscar por nombre del rol..."
                            class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-[var(--color-secondary)] focus:outline-none text-slate-700">
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-buscar" class="text-white font-bold py-2 px-6 rounded-lg transition shadow-sm roles-btn-primary">Buscar</button>
                        <button id="btn-limpiar" class="font-bold py-2 px-6 rounded-lg transition shadow-sm roles-btn-secondary">Limpiar</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden roles-card">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="p-4 font-bold text-[11px] uppercase tracking-wider text-slate-400">Nombre del Rol</th>
                                <th class="p-4 font-bold text-[11px] uppercase tracking-wider text-slate-400 text-center">Estado</th>
                                <th class="p-4 font-bold text-[11px] uppercase tracking-wider text-slate-400 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="roles-tbody" class="divide-y divide-slate-100">
                            <!-- JS inyectará las filas aquí -->
                            <tr><td colspan="3" class="p-8 text-center text-slate-500 italic">Cargando roles...</td></tr>
                        </tbody>
                    </table>
                </div>
            <!-- Paginación (Sección que faltaba) -->
                <div class="p-4 bg-slate-50 border-t border-slate-200 flex justify-between items-center text-xs text-slate-500 font-medium roles-paginacion">
                    <span id="roles-info">Mostrando 0 a 0 de 0 roles</span>
                    <div class="flex gap-1" id="pagination-controls">
                        <button id="prevPage" class="px-4 py-1.5 border border-slate-200 rounded-lg bg-white hover:bg-slate-100 disabled:opacity-50 transition-colors">
                            ← Anterior
                        </button>
                        <button id="nextPage" class="px-4 py-1.5 border border-slate-200 rounded-lg bg-white hover:bg-slate-100 disabled:opacity-50 transition-colors">
                            Siguiente →
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <footer><p>&copy; 2026 Hospedaje Digital. Todos los derechos reservados.</p></footer>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/rolFormModal.js"></script>
    <script src="../js/roles.js"></script>
    <script src="../js/campana-notificaciones.js"></script>
</body>
</html>
